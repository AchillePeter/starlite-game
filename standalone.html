              ctx.fillStyle = e.color;
              ctx.beginPath(); ctx.arc(e.x, e.y, radius, 0, Math.PI * 2); ctx.fill();
            }
          } else if (e.type === 'shockwave') {
            const radius = (e.maxRadius || 24) * progress;
            ctx.globalAlpha = alpha * .85;
            ctx.strokeStyle = e.color;
            ctx.lineWidth = Math.max(1, (e.width || 3) * alpha) / cam.zoom;
            ctx.beginPath(); ctx.arc(e.x, e.y, radius, 0, Math.PI * 2); ctx.stroke();
          } else if (e.type === 'aceDodge') {
            const tx = e.target?.x ?? e.x, ty = e.target?.y ?? e.y;
            ctx.translate(tx, ty);
            ctx.rotate(progress * Math.PI * 2.5);
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = e.color;
            ctx.shadowColor = e.color;
            ctx.shadowBlur = 12;
            ctx.lineWidth = 2.2 / cam.zoom;
            ctx.beginPath();
            ctx.arc(0, 0, 18 + progress * 12, -.35, Math.PI * 1.35);
            ctx.stroke();
            ctx.strokeStyle = '#f4fbff';
            ctx.lineWidth = 1 / cam.zoom;
            ctx.beginPath();
            ctx.arc(0, 0, 10 + progress * 8, Math.PI * .75, Math.PI * 2.35);
            ctx.stroke();
            ctx.shadowBlur = 0;
          } else if (e.type === 'electricChain' && e.chain?.length > 1) {
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = e.color;
            ctx.shadowColor = e.color;
            ctx.shadowBlur = 14;
            ctx.lineWidth = 3 / cam.zoom;
            ctx.lineJoin = 'round';
            for (let i = 0; i < e.chain.length - 1; i++) {
              const a = e.chain[i], b = e.chain[i + 1];
              const dx = b.x - a.x, dy = b.y - a.y;
              const len = Math.max(1, Math.hypot(dx, dy));
              const px = -dy / len, py = dx / len;
              ctx.beginPath();
              for (let step = 0; step <= 5; step++) {
                const t = step / 5;
                const jitter = Math.sin(state.elapsed * 60 + (e.jitterSeed || 0) + i * 7 + step * 3.1) * 5 * alpha;
                const x = a.x + dx * t + px * jitter;
                const y = a.y + dy * t + py * jitter;
                if (step === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
              }
              ctx.stroke();
              ctx.strokeStyle = '#f4fbff';
              ctx.lineWidth = 1.1 / cam.zoom;
              ctx.stroke();
              ctx.strokeStyle = e.color;
              ctx.lineWidth = 3 / cam.zoom;
            }
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#f4fbff';
            for (const target of e.chain) {
              ctx.beginPath(); ctx.arc(target.x, target.y, 2.5 + progress * 4, 0, Math.PI * 2); ctx.fill();
            }
          } else if (e.type === 'healingWave') {
            const tx = e.target?.x ?? e.x, ty = e.target?.y ?? e.y;
            const radius = (e.radius || 78) * (.18 + progress * .82);
            ctx.translate(tx, ty);
            ctx.globalCompositeOperation = 'lighter';
            ctx.globalAlpha = alpha * .82;
            ctx.strokeStyle = e.color;
            ctx.shadowColor = e.color; ctx.shadowBlur = 13;
            ctx.lineWidth = Math.max(1.5, 5 * alpha) / cam.zoom;
            ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.stroke();
            ctx.globalAlpha = alpha * .45;
            ctx.lineWidth = 2 / cam.zoom;
            ctx.beginPath(); ctx.arc(0, 0, radius * .7, 0, Math.PI * 2); ctx.stroke();
            ctx.globalAlpha = alpha * .72;
            for (const ally of e.targets || []) {
              if (!ally || ally.hp <= 0) continue;
              ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(ally.x - tx, ally.y - ty); ctx.stroke();
              ctx.beginPath(); ctx.arc(ally.x - tx, ally.y - ty, 5 + progress * 5, 0, Math.PI * 2); ctx.stroke();
            }
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#effff5';
            ctx.fillRect(-2, -8, 4, 16); ctx.fillRect(-8, -2, 16, 4);
          } else if (e.type === 'beam' && e.source && e.target) {
            const sx = e.source.x, sy = e.source.y;
            const tx = e.target.x, ty = e.target.y;
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = e.color;
            ctx.lineWidth = (e.width || 3) / cam.zoom;
            if (e.repair) ctx.setLineDash([5 / cam.zoom, 3 / cam.zoom]);
            if (e.engineer) ctx.shadowColor = e.color, ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(tx, ty); ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.setLineDash([]);
            ctx.strokeStyle = '#f5fff0';
            ctx.lineWidth = 1 / cam.zoom;
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(tx, ty); ctx.stroke();
            ctx.strokeStyle = e.color;
            ctx.beginPath(); ctx.arc(tx, ty, 6 + progress * 5, 0, Math.PI * 2); ctx.stroke();
          }
          ctx.restore();
        }
      
        for (const p of state.particles) {
          if (!entityInCamera(p, 36)) continue;
          ctx.globalAlpha = clamp(p.life / p.max, 0, 1) * (p.alpha ?? 1);
          ctx.fillStyle = p.color;
          if (p.shape === 'smoke' || p.shape === 'orb') {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
          } else if (p.shape === 'flame') {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(Math.atan2(p.vy, p.vx));
            ctx.globalCompositeOperation = 'lighter';
            ctx.shadowColor = p.color; ctx.shadowBlur = 7;
            ctx.beginPath();
            ctx.moveTo(p.size * 1.6, 0);
            ctx.lineTo(-p.size, -p.size * .72);
            ctx.lineTo(-p.size * .45, 0);
            ctx.lineTo(-p.size, p.size * .72);
            ctx.closePath(); ctx.fill();
            ctx.restore();
          } else if (p.shape === 'spark') {
            ctx.save();
            ctx.translate(p.x, p.y); ctx.rotate(Math.atan2(p.vy, p.vx));
            ctx.fillRect(-p.size, -Math.max(.5, p.size * .22), p.size * 2.4, Math.max(1, p.size * .44));
            ctx.restore();
          } else {
            ctx.fillRect(Math.round(p.x), Math.round(p.y), Math.ceil(p.size), Math.ceil(p.size));
          }
        }
        ctx.globalAlpha = 1;
      }
      
      function drawFog() {

          for (let x = x0; x <= x1; x++) {

      function drawBuildingPlacementPreview() {
        const type = state.placingBuildingType;
        const data = BUILDING_DATA[type];
        if (!type || !data || state.mouse.x < 0 || state.mouse.x >= VIEW_W || state.mouse.y < 0 || state.mouse.y >= VIEW_H) return;
        const preview = resolveBuildingPlacement(type, screenToWorld(state.mouse.x, state.mouse.y));
        const color = preview.valid ? '#65f58a' : '#ff6b6b';
        const fill = preview.valid ? 'rgba(62,221,112,.34)' : 'rgba(255,82,82,.28)';
        const x = preview.cx, y = preview.cy;
        const left = x - data.w / 2, top = y - data.h / 2;
      
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = fill;
        ctx.fillRect(left, top, data.w, data.h);
        ctx.fillStyle = preview.valid ? 'rgba(119,255,154,.24)' : 'rgba(255,130,130,.2)';
        ctx.fillRect(left + data.w * .15, top + data.h * .18, data.w * .7, data.h * .64);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2 / cam.zoom;
        ctx.setLineDash([6 / cam.zoom, 4 / cam.zoom]);
        ctx.strokeRect(left, top, data.w, data.h);
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(left, y); ctx.lineTo(left + data.w, y);
        ctx.moveTo(x, top); ctx.lineTo(x, top + data.h);
        ctx.stroke();
      
        const corner = Math.min(10, data.w * .2, data.h * .2);
        ctx.lineWidth = 3 / cam.zoom;
        for (const [cx, cy, sx, sy] of [
          [left, top, 1, 1], [left + data.w, top, -1, 1],
          [left, top + data.h, 1, -1], [left + data.w, top + data.h, -1, -1]
        ]) {
          ctx.beginPath();
          ctx.moveTo(cx + sx * corner, cy); ctx.lineTo(cx, cy); ctx.lineTo(cx, cy + sy * corner);
          ctx.stroke();
        }
        const label = preview.valid ? `PLACE ${data.label}` : 'INVALID BUILD SITE';
        drawText(label, x, top + data.h + 6 / cam.zoom, 9 / cam.zoom, color, 'center');
        ctx.restore();

      function drawSpawnFlag() {
        const paintFlag = (p, ghost = false, label = 'SPAWN', color = COLORS.warn) => {
          ctx.save();
          ctx.globalAlpha = ghost ? .5 : 1;
          ctx.strokeStyle = color;
          ctx.lineWidth = 2 / cam.zoom;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 11 + Math.sin(state.elapsed * 4) * 2, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = '#111720';
          ctx.fillRect(p.x - 2, p.y - 30, 5, 31);
          ctx.fillStyle = color;
          ctx.fillRect(p.x, p.y - 29, 3, 30);
          ctx.beginPath();
          ctx.moveTo(p.x + 3, p.y - 29);
          ctx.lineTo(p.x + 22, p.y - 22);
          ctx.lineTo(p.x + 3, p.y - 15);
          ctx.closePath(); ctx.fill();
          drawText(ghost ? 'PLACE' : label, p.x, p.y + 14, 9, color, 'center');
          ctx.restore();
        };
        const groupedFlags = new Map();
        for (const structure of structures) {
          if (structure.team !== activeCommandTeam() || structure.hp <= 0 || !structure.spawnFlag || !isProductionBuilding(structure)) continue;
          const key = `${structure.type}:${structure.spawnFlag.x}:${structure.spawnFlag.y}`;
          const entry = groupedFlags.get(key) || { point: structure.spawnFlag, type: structure.type, count: 0 };
          entry.count++;
          groupedFlags.set(key, entry);
        }
        for (const entry of groupedFlags.values()) {
          const label = `${entry.count > 1 ? `${entry.count}× ` : ''}${spawnFlagShortLabel(entry.type)}`;
          paintFlag(entry.point, false, label, spawnFlagColor(entry.type));
        }
        if (state.placingSpawnFlag) {
          const count = state.spawnFlagStructureIds.length;
          const label = `${count > 1 ? `${count}× ` : ''}${spawnFlagShortLabel(state.spawnFlagMode)}`;
          paintFlag(screenToWorld(state.mouse.x, state.mouse.y), true, label, spawnFlagColor(state.spawnFlagMode));
        }
      }

      function drawMinimap() {
        const g = minimapGeom();
        const { x: mx, y: my, w: mmW, h: mmH, sx, sy } = g;
        drawPanel(mx, my, mmW, mmH, 'rgba(10,14,20,.85)');
        // Explored terrain hint.
        for (let y = 0; y < ROWS; y += 2) {
          for (let x = 0; x < COLS; x += 2) {
            if (!state.explored[y][x]) continue;
            const t = terrain[y][x];
            ctx.fillStyle = t === 1 ? 'rgba(39,75,99,.9)'
              : t === 2 ? 'rgba(90,95,107,.9)'
              : sandTiles[y][x] ? 'rgba(155,134,88,.78)'
              : transitionTiles[y][x] ? 'rgba(118,113,72,.72)'
              : dirtTiles[y][x] ? 'rgba(153,119,77,.72)'
              : 'rgba(64,82,60,.7)';
            ctx.fillRect(mx + x * TILE * sx, my + y * TILE * sy, TILE * sx * 2, TILE * sy * 2);
          }
        }
        const dot = (o, col) => {
          if (o.team !== activeCommandTeam() && !isVisibleToTeam(activeCommandTeam(), o.x, o.y)) return;
          ctx.fillStyle = col;
          ctx.fillRect(mx + o.x * sx - 1, my + o.y * sy - 1, 3, 3);
        };
        for (const s of structures) if (s.hp > 0) dot(s, colorForTeam(s.team));
        for (const u of units) if (u.hp > 0) dot(u, colorForTeam(u.team, 'light'));
        const minimapFlags = new Set();
        for (const structure of structures) {
          if (structure.team !== activeCommandTeam() || structure.hp <= 0 || !structure.spawnFlag || !isProductionBuilding(structure)) continue;
          const key = `${structure.spawnFlag.x}:${structure.spawnFlag.y}:${structure.type}`;
          if (minimapFlags.has(key)) continue;
          minimapFlags.add(key);
          ctx.fillStyle = spawnFlagColor(structure.type);
          ctx.fillRect(mx + structure.spawnFlag.x * sx - 2, my + structure.spawnFlag.y * sy - 2, 5, 5);
        }
        // Camera viewport rectangle.
        ctx.strokeStyle = COLORS.warn; ctx.lineWidth = 1;
        ctx.strokeRect(mx + cam.x * sx, my + cam.y * sy, (VIEW_W / cam.zoom) * sx, (VIEW_H / cam.zoom) * sy);

        if (state.selected.size && pointInRect(state.mouse, g)) {
          ctx.strokeStyle = 'rgba(135,224,111,.9)'; ctx.lineWidth = 2;
          ctx.strokeRect(mx + 1, my + 1, mmW - 2, mmH - 2);
        }
        drawText('MINIMAP · click to send', mx + 4, my - 13, 9, COLORS.muted);

      function drawPixelGear(x, y, size, color = COLORS.text) {
        const unit = Math.max(2, Math.floor(size / 9));
        const cx = Math.round(x + size / 2), cy = Math.round(y + size / 2);
        ctx.fillStyle = color;
        ctx.fillRect(cx - unit, y + unit, unit * 2, unit * 2);
        ctx.fillRect(cx - unit, y + size - unit * 3, unit * 2, unit * 2);
        ctx.fillRect(x + unit, cy - unit, unit * 2, unit * 2);
        ctx.fillRect(x + size - unit * 3, cy - unit, unit * 2, unit * 2);
        ctx.fillRect(x + unit * 2, y + unit * 2, size - unit * 4, size - unit * 4);
        ctx.fillStyle = '#111923';
        ctx.fillRect(cx - unit, cy - unit, unit * 2, unit * 2);

          .map(team => state.computerAIs?.[team])
          .filter(Boolean);
        const nextWaveClock = liveAIs.length ? Math.min(...liveAIs.map(ai => Math.max(0, ai.clock))) : null;
        const highestWave = liveAIs.length ? Math.max(...liveAIs.map(ai => ai.wave || 0)) : 0;
        const popUsed = populationUsed(team), popCap = populationCap(team);

        drawText(`◆ ${Math.floor(wallet.minerals)}`, 24, 20, 18, COLORS.mineral);

        if (!pathWorker || !Array.isArray(grid) || !cols || !rows) return false;
        const flat = new Uint8Array(cols * rows);
        let offset = 0;
        for (let y = 0; y < rows; y++) {
          const row = grid[y];
          for (let x = 0; x < cols; x++) flat[offset++] = row?.[x] || 0;
        }
        pathTerrainRevision = revision;
        pathWorker.postMessage({ type: 'terrain', cols, rows, tile, revision, buffer: flat.buffer }, [flat.buffer]);
        return true;
      }
      
      function requestPathfinding(sx, sy, gx, gy, callback) {
        initializePerformanceWorkers();
        if (!pathWorker || pathTerrainRevision < 0 || typeof callback !== 'function') return false;
        const id = pathRequestId++;
        pathCallbacks.set(id, callback);
        pathWorker.postMessage({ type: 'path', id, sx, sy, gx, gy, revision: pathTerrainRevision });
        return id;
      }
      
      function cancelPathfindingRequest(id) {
        if (!id) return;
        pathCallbacks.delete(id);
      }
      
      function requestAIAnalysis(snapshot, callback) {
        initializePerformanceWorkers();
        if (!aiWorker || !snapshot || typeof callback !== 'function') return false;
        const id = aiRequestId++;
        aiCallbacks.set(id, callback);
        aiWorker.postMessage({ type: 'analyze', id, snapshot });
        return id;
      }
      
      function performanceWorkerStatus() {
        return {
          deterministicLockstepMode,
          pathfinding: !!pathWorker,
          ai: !!aiWorker,
          terrainRevision: pathTerrainRevision,
          pendingPaths: pathCallbacks.size,
          pendingAI: aiCallbacks.size
        };
      }
    }
